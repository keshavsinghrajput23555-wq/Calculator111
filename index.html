<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --panel: #1a1a28;
      --border: #2a2a45;
      --accent: #00e5ff;
      --accent2: #ff6b35;
      --text: #e0e8ff;
      --muted: #5a6a8a;
      --glow: 0 0 20px rgba(0, 229, 255, 0.4);
      --glow2: 0 0 20px rgba(255, 107, 53, 0.4);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(0,229,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.04) 0%, transparent 50%),
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      background-position: 0 0, 0 0, -1px -1px, -1px -1px;
    }

    .calculator {
      width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 
        0 0 0 1px rgba(0,229,255,0.1),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .calculator::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.8;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      font-family: 'Orbitron', monospace;
    }

    .header h1 {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      position: relative;
      overflow: hidden;
    }

    .display::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,229,255,0.015) 2px,
        rgba(0,229,255,0.015) 4px
      );
      pointer-events: none;
    }

    .expression {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      min-height: 18px;
      letter-spacing: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    .result {
      font-size: 36px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      color: var(--accent);
      text-shadow: var(--glow);
      letter-spacing: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
      transition: all 0.1s;
    }

    .result.error { color: var(--accent2); text-shadow: var(--glow2); }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 0;
      height: 60px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-size: 16px;
      font-family: 'Share Tech Mono', monospace;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    button:hover { 
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,229,255,0.15), inset 0 0 0 1px rgba(0,229,255,0.1);
    }

    button:active::after { opacity: 1; }
    button:active { transform: translateY(1px); }

    button.operator {
      color: var(--accent2);
      border-color: rgba(255,107,53,0.3);
      background: rgba(255,107,53,0.06);
    }
    button.operator:hover {
      border-color: var(--accent2);
      box-shadow: 0 4px 16px rgba(255,107,53,0.15);
    }

    button.equals {
      background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(0,229,255,0.05));
      border-color: var(--accent);
      color: var(--accent);
      font-size: 20px;
      font-weight: 900;
      box-shadow: inset 0 0 20px rgba(0,229,255,0.1);
    }
    button.equals:hover {
      background: linear-gradient(135deg, rgba(0,229,255,0.35), rgba(0,229,255,0.1));
      box-shadow: 0 4px 24px rgba(0,229,255,0.3), inset 0 0 20px rgba(0,229,255,0.2);
    }

    button.clear {
      color: #ff4d6d;
      border-color: rgba(255,77,109,0.3);
      background: rgba(255,77,109,0.06);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
    }
    button.clear:hover { border-color: #ff4d6d; box-shadow: 0 4px 16px rgba(255,77,109,0.2); }

    button.special {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
    }
    button.special:hover { color: var(--text); }

    button.wide { grid-column: span 2; }

    .flash {
      animation: flash 0.15s ease;
    }
    @keyframes flash {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="header">
      <h1>CALC · SYS · v2.0</h1>
    </div>
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="special" onclick="toggleSign()">+/-</button>
      <button class="special" onclick="percent()">%</button>
      <button class="operator" onclick="appendOp('/')">÷</button>

      <!-- Row 2 -->
      <button onclick="appendNum('7')">7</button>
      <button onclick="appendNum('8')">8</button>
      <button onclick="appendNum('9')">9</button>
      <button class="operator" onclick="appendOp('*')">×</button>

      <!-- Row 3 -->
      <button onclick="appendNum('4')">4</button>
      <button onclick="appendNum('5')">5</button>
      <button onclick="appendNum('6')">6</button>
      <button class="operator" onclick="appendOp('-')">−</button>

      <!-- Row 4 -->
      <button onclick="appendNum('1')">1</button>
      <button onclick="appendNum('2')">2</button>
      <button onclick="appendNum('3')">3</button>
      <button class="operator" onclick="appendOp('+')">+</button>

      <!-- Row 5 -->
      <button onclick="appendNum('0')" class="wide">0</button>
      <button onclick="appendDot()">.</button>
      <button class="equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let expression = '';
    let justCalculated = false;

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = current.length > 10 ? parseFloat(current).toExponential(4) : current;
      expressionEl.textContent = expression;
      resultEl.classList.remove('error');
    }

    function flash() {
      resultEl.classList.remove('flash');
      void resultEl.offsetWidth;
      resultEl.classList.add('flash');
    }

    function appendNum(n) {
      if (justCalculated) {
        current = n;
        expression = '';
        justCalculated = false;
      } else {
        current = current === '0' ? n : current + n;
      }
      if (current.length > 12) return;
      updateDisplay();
    }

    function appendDot() {
      if (justCalculated) { current = '0.'; justCalculated = false; }
      else if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function appendOp(op) {
      justCalculated = false;
      expression = current + ' ' + op;
      current = '0';
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      expression = '';
      justCalculated = false;
      flash();
      updateDisplay();
    }

    function toggleSign() {
      current = String(parseFloat(current) * -1);
      updateDisplay();
    }

    function percent() {
      current = String(parseFloat(current) / 100);
      updateDisplay();
    }

    function calculate() {
      if (!expression) return;
      const expr = expression + ' ' + current;
      expressionEl.textContent = expr + ' =';
      try {
        // Safe eval using Function
        const result = Function('"use strict"; return (' + expr + ')')();
        if (!isFinite(result)) throw new Error('Infinity');
        current = String(parseFloat(result.toFixed(10)));
        expression = expr;
        justCalculated = true;
        flash();
      } catch {
        resultEl.classList.add('error');
        current = 'ERROR';
        expression = '';
        justCalculated = false;
      }
      updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') appendNum(e.key);
      else if (e.key === '.') appendDot();
      else if (e.key === '+') appendOp('+');
      else if (e.key === '-') appendOp('-');
      else if (e.key === '*') appendOp('*');
      else if (e.key === '/') { e.preventDefault(); appendOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
